name: Deploy to qa

on:
  push:
    branches:
      - 'qa'

jobs:
  redeploy_backend:
    name: Deploy Backend to qa
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install dependencies and build
        run: |
          npm install -f
          npm run build
        continue-on-error: false

      - name: SSH Into Server and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.51.74.160
          username: ubuntu                 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /thiredx/thirdxBE
            sudo git stash
            sudo git fetch --all
            sudo git checkout qa
            sudo git pull origin qa
            sudo git log -1
            sudo npm install
            pm2 restart thirdexQA
